# Generates the snake that "eats" your contribution graph.
# Uses a Personal Access Token (GH_TOKEN secret) instead of the default token,
# matching the setup that's confirmed working.

name: Generate snake animation

on:
  schedule:
    - cron: "0 5,17 * * *"   # runs twice a day (5am and 5pm UTC)
  workflow_dispatch:          # lets you trigger it manually from the Actions tab

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: generate snake.svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: dist/snake.svg?palette=github-dark

      - name: push snake.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
