# Genera el snake que se "come" tu gráfica de contribuciones.
# Corre una vez al día y también se puede lanzar manualmente desde la pestaña Actions.

name: generate profile snake

on:
  schedule:
    - cron: "0 5 * * *"   # todos los días a las 5:00 UTC
  workflow_dispatch:        # permite correrlo manualmente

permissions:
  contents: write            # necesario para que la Action pueda pushear al branch "output"

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      # Genera dos versiones del SVG: una para modo claro y otra para modo oscuro
      - name: generate snake svg
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg?palette=github-dark

      # Sube los SVG generados al branch "output" (se crea solo la primera vez)
      - name: push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
